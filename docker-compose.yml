services:
  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/app.db}
      IMPORT_TMP_DIR: ${IMPORT_TMP_DIR:-/data/imports_tmp}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-Australia/Melbourne}
    volumes:
      - ./data:/data
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/requirements.txt:/app/requirements.txt
    ports:
      - "127.0.0.1:8000:8000"
  frontend:
    build:
      context: ./frontend
      target: deps
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_MAP_TILE_URL: ${NEXT_PUBLIC_MAP_TILE_URL:-https://example.com/satellite/{z}/{x}/{y}.jpg}
        NEXT_PUBLIC_MAP_ATTRIBUTION: ${NEXT_PUBLIC_MAP_ATTRIBUTION:-Satellite imagery attribution}
    command: npm run dev -- --hostname 0.0.0.0
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_MAP_TILE_URL: ${NEXT_PUBLIC_MAP_TILE_URL:-https://example.com/satellite/{z}/{x}/{y}.jpg}
      NEXT_PUBLIC_MAP_ATTRIBUTION: ${NEXT_PUBLIC_MAP_ATTRIBUTION:-Satellite imagery attribution}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"
